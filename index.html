<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>💕</title>
<style>
  :root { --accent: #f06292; }
  * { box-sizing: border-box; }
  html, body {
    height: 100%; margin: 0;
    font-family: 'Arial', 'Noto Sans TC', sans-serif;
    background: url('bg.jpg') center bottom/cover no-repeat fixed #0a0a12;
    color: #111;
  }
  .start-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: flex-end;
    flex-direction: column; gap: 12px; padding-bottom: 15vh;
    background: transparent; color: #fff; z-index: 10000; cursor: pointer;
  }
  .start-screen.hidden { display: none; }
  .start-icon { font-size: 48px; animation: bounce 1.5s infinite; }
  .start-text { font-size: 18px; opacity: .9; text-shadow: 0 2px 12px rgba(0,0,0,.7); }
  .start-hint { font-size: 13px; opacity: .6; text-shadow: 0 1px 8px rgba(0,0,0,.7); }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

  .modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  .modal.hidden { display: none; }
  .dialog {
    background: #fff; padding: 30px 36px; border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
    text-align: center; max-width: 90%; min-width: min(380px, 85vw);
    transition: opacity .3s;
  }
  .dialog.fade { opacity: 0; }
  .dialog h2 { margin: 0 0 6px; font-size: 21px; }
  .dialog .hint { font-size: 13px; color: #bbb; margin-bottom: 20px; }
  .dialog .reply { font-size: 20px; font-weight: 700; color: var(--accent); padding: 18px 0; }
  .dots { display: flex; gap: 5px; justify-content: center; margin-bottom: 14px; }
  .dots span { width: 7px; height: 7px; border-radius: 50%; background: #e0e0e0; display: inline-block; }
  .dots span.on { background: var(--accent); }
  .buttons { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 8px 0; }
  .btn { padding: 10px 24px; border-radius: 8px; border: 0; cursor: pointer; font-size: 16px; font-weight: 700; white-space: nowrap; font-family: inherit; }
  .agree { background: var(--accent); color: #fff; }
  .disagree { background: #ddd; color: #333; }
  .disagree:disabled { pointer-events: none; opacity: .98; }
  .hidden { display: none; }

  /* story slideshow */
  .story {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.85);
    z-index: 9000;
  }
  .story.hidden { display: none; }
  .story img {
    max-width: min(360px, 75vw);
    max-height: 70vh;
    border-radius: 16px;
    opacity: 0;
    transition: opacity .8s;
  }
  .story img.show { opacity: 1; }

  /* congrats */
  .congrats {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(0,0,0,.6), rgba(0,0,0,.8));
    color: #fff;
  }
  .congrats.hidden { display: none !important; }
  .congrats .sticker { width: 160px; z-index: 1; margin-bottom: 10px; }
  .congrats h1 { font-size: 56px; margin: 0 0 10px; text-shadow: 0 4px 16px rgba(0,0,0,.6); z-index: 1; }
  .congrats p { font-size: 16px; opacity: .8; z-index: 1; }
  .congrats .tag { margin-top: 12px; padding: 8px 16px; background: rgba(255,255,255,.15); border-radius: 8px; font-weight: 700; font-size: 14px; z-index: 1; }
  #fireworks { position: absolute; inset: 0; display: block; width: 100%; height: 100%; }

  @media (max-width: 420px) {
    .dialog { padding: 20px 22px; min-width: 85vw; }
    .dialog h2 { font-size: 18px; }
    .congrats h1 { font-size: 36px; }
    .congrats .sticker { width: 120px; }
    .story img { max-width: 80vw; }
  }
</style>
</head>
<body>

<div class="start-screen" id="startScreen" onclick="startApp()">
  <div class="start-icon">💌</div>
  <div class="start-text">有人想對妳說些話...</div>
  <div class="start-hint">點一下開始</div>
</div>

<audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

<div class="modal hidden" id="modal">
  <div class="dialog" id="dialog"></div>
</div>

<!-- 故事幻燈片 -->
<div class="story hidden" id="story">
  <img id="storyImg" src="" alt="">
</div>

<div class="congrats hidden" id="congrats">
  <img class="sticker" src="sticker.gif" alt="">
  <h1>💕 Love youu mwah 💕</h1>
  <p>就知道妳想kaikai～每一題都逃不掉呢 😏</p>
  <div class="tag" id="tag"></div>
  <canvas id="fireworks"></canvas>
</div>

<script>
var QS = [
  { q:"Baby 妳今天想kaikai了嗎？", h:"老實回答喔 🤨", y:"想了啦", n:"才沒有", r:"這才乖嘛 💗" },
  { q:"妳今天有乖乖吃飯嗎？", h:"不准說沒有 🍚", y:"有吃了", n:"還沒欸", r:"要好好吃飯知道嗎 🥺" },
  { q:"那妳有多想kaikai？", h:"選一個最真實的", y:"超級想!", n:"一點點而已", r:"kaikai也超級想妳 🥺" },
  { q:"妳今天有喝水嗎？", h:"至少要喝八杯喔 💧", y:"有喝了", n:"忘了", r:"現在馬上去喝一杯！💧" },
  { q:"妳現在在笑對不對？", h:"不要裝了啦", y:"被kaikai發現了", n:"才沒有笑", r:"笑起來最好看了 😊" },
  { q:"工作累嗎？", h:"kaikai心疼妳 🥺", y:"好累...", n:"還好啦", r:"辛苦了寶貝 kaikai幫妳揉揉 💆‍♀️" },
  { q:"妳覺得kaikai可愛嗎？", h:"認真想一下再回答", y:"超可愛的好嗎", n:"還好吧", r:"Baby比較可愛啦 ☺️" },
  { q:"妳現在有在想kaikai嗎？", h:"就是現在這一秒 🫣", y:"有啦！", n:"沒有欸", r:"妳看到這題就是在想了 😏💗" },
  { q:"妳今天有不開心嗎？", h:"跟kaikai說 ❤️", y:"有一點點", n:"沒有啦", r:"不管怎樣kaikai都陪妳 💕" },
  { q:"妳覺得kaikai對妳好嗎？", h:"要打分喔 💯", y:"超好的", n:"還可以", r:"以後會對妳更好 ☺️💗" },
  { q:"妳有好好休息嗎？", h:"不要太晚睡喔 😴", y:"有啦", n:"沒有", r:"要早點睡 kaikai會擔心 🌙" },
  { q:"妳愛kaikai嗎？", h:"這題很重要喔 💓", y:"愛妳愛妳愛妳", n:"讓我想想", r:"kaikai也愛妳 💕" },
  { q:"那妳有多愛kaikai？", h:"說出來！", y:"愛到不行", n:"普通愛", r:"kaikai愛妳更多 🥰" },
  { q:"妳今晚會夢到kaikai嗎？", h:"要說實話喔 😴", y:"會！", n:"不一定", r:"那kaikai會出現在妳夢裡 😘" },
  { q:"最後一題！妳會一直想著kaikai嗎？", h:"答對了就放妳走～ 💓", y:"一直都會", n:"不一定欸", r:"那我們說好了喔 💕" },
];

var cur = 0, escaped = 0;
var dialog = document.getElementById("dialog");
var modalEl = document.getElementById("modal");

var CM = 96/2.54, KEEP_DIST = 5*CM, AVOID_MARGIN = 30;
var btnOrigX=null, btnOrigY=null;
var currentTX=0, currentTY=0, targetTX=0, targetTY=0;
var mouseX=-9999, mouseY=-9999;
var noBtn=null, yesBtn=null, isFixed=false;

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function resetDodge(){
  btnOrigX=null; btnOrigY=null;
  currentTX=0; currentTY=0; targetTX=0; targetTY=0;
  isFixed=false; noBtn=null; yesBtn=null;
}

function overlapsYes(left,top,w,h){
  if(!yesBtn) return false;
  var yr=yesBtn.getBoundingClientRect();
  var m=AVOID_MARGIN;
  return !(left>yr.right+m||left+w<yr.left-m||top>yr.bottom+m||top+h<yr.top-m);
}

function computeTarget(){
  if(!noBtn) return;
  if(!isFixed){
    var r=noBtn.getBoundingClientRect();
    btnOrigX=Math.round(r.left); btnOrigY=Math.round(r.top);
    var yr=yesBtn.getBoundingClientRect();
    yesBtn.style.position='fixed';
    yesBtn.style.left=Math.round(yr.left)+'px';
    yesBtn.style.top=Math.round(yr.top)+'px';
    yesBtn.style.margin='0'; yesBtn.style.zIndex='9998';
    noBtn.style.position='fixed';
    noBtn.style.left=btnOrigX+'px'; noBtn.style.top=btnOrigY+'px';
    noBtn.style.margin='0'; noBtn.style.zIndex='9999';
    currentTX=0;currentTY=0;targetTX=0;targetTY=0;
    isFixed=true;
  }
  var br=noBtn.getBoundingClientRect();
  var bw=br.width, bh=br.height;
  var mx=mouseX, my=mouseY;
  var cx=btnOrigX+currentTX+bw/2, cy=btnOrigY+currentTY+bh/2;
  var vx=cx-mx, vy=cy-my, dist=Math.hypot(vx,vy);

  if(dist<KEEP_DIST){
    escaped++;
    var ux,uy;
    if(dist===0){var a=Math.random()*Math.PI*2;ux=Math.cos(a);uy=Math.sin(a);}
    else{ux=vx/dist;uy=vy/dist;}
    var dL=mx+ux*KEEP_DIST-bw/2;
    var dT=my+uy*KEEP_DIST-bh/2;
    dL=clamp(dL,0,window.innerWidth-bw);
    dT=clamp(dT,0,window.innerHeight-bh);

    if(overlapsYes(dL,dT,bw,bh)){
      var best=null, bestDist=0;
      for(var i=0;i<12;i++){
        var angle=i*Math.PI/6;
        var tryL=mx+Math.cos(angle)*KEEP_DIST-bw/2;
        var tryT=my+Math.sin(angle)*KEEP_DIST-bh/2;
        tryL=clamp(tryL,0,window.innerWidth-bw);
        tryT=clamp(tryT,0,window.innerHeight-bh);
        if(!overlapsYes(tryL,tryT,bw,bh)){
          var d=Math.hypot(tryL-mx,tryT-my);
          if(d>bestDist){bestDist=d;best={l:tryL,t:tryT};}
        }
      }
      if(best){dL=best.l;dT=best.t;}
      else{
        var yr2=yesBtn.getBoundingClientRect();
        var ycx=yr2.left+yr2.width/2, ycy=yr2.top+yr2.height/2;
        var awayX=dL+bw/2-ycx, awayY=dT+bh/2-ycy;
        var ad=Math.hypot(awayX,awayY)||1;
        dL=clamp(dL+awayX/ad*100,0,window.innerWidth-bw);
        dT=clamp(dT+awayY/ad*100,0,window.innerHeight-bh);
      }
    }
    targetTX=dL-btnOrigX; targetTY=dT-btnOrigY;
  } else { targetTX=0; targetTY=0; }
}

window.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY;computeTarget();});
window.addEventListener('touchmove',function(e){mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;computeTarget();},{passive:true});
window.addEventListener('touchstart',function(e){mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;computeTarget();},{passive:true});

(function animate(){
  var ease=0.14;
  currentTX+=(targetTX-currentTX)*ease;
  currentTY+=(targetTY-currentTY)*ease;
  if(Math.abs(targetTX-currentTX)<.3)currentTX=targetTX;
  if(Math.abs(targetTY-currentTY)<.3)currentTY=targetTY;
  if(noBtn&&isFixed)noBtn.style.transform='translate('+currentTX+'px,'+currentTY+'px)';
  requestAnimationFrame(animate);
})();

function dots(n){
  return '<div class="dots">'+QS.map(function(_,i){return '<span class="'+(i<n?'on':'')+'"></span>';}).join('')+'</div>';
}

function render(){
  if(cur>=QS.length) return playStory();
  var d=QS[cur];
  resetDodge();
  dialog.classList.add("fade");
  setTimeout(function(){
    dialog.innerHTML=
      dots(cur)+
      '<h2>'+d.q+'</h2><div class="hint">'+d.h+'</div>'+
      '<div class="buttons">'+
        '<button class="btn agree" id="yesBtn">'+d.y+'</button>'+
        '<button class="btn disagree" id="noBtn" disabled tabindex="-1">'+d.n+'</button>'+
      '</div>';
    dialog.classList.remove("fade");
    yesBtn=document.getElementById("yesBtn");
    noBtn=document.getElementById("noBtn");
    noBtn.addEventListener('click',function(e){e.preventDefault();});
    yesBtn.onclick=function(){
      if(noBtn){noBtn.style.display='none';noBtn=null;}
      dialog.classList.add("fade");
      setTimeout(function(){
        dialog.innerHTML=dots(cur+1)+'<div class="reply">'+d.r+'</div>';
        dialog.classList.remove("fade");
        cur++;
        setTimeout(render,1200);
      },300);
    };
  }, cur===0?50:350);
}

/* ★ 故事幻燈片：三張圖一張一張淡入淡出 */
function playStory(){
  modalEl.classList.add("hidden");
  var storyDiv=document.getElementById("story");
  var storyImg=document.getElementById("storyImg");
  var images=["story1.png","story2.png","story3.png"];
  var idx=0;

  storyDiv.classList.remove("hidden");

  function showNext(){
    if(idx>=images.length){
      storyDiv.classList.add("hidden");
      finish();
      return;
    }
    storyImg.classList.remove("show");
    setTimeout(function(){
      storyImg.src=images[idx];
      storyImg.onload=function(){
        storyImg.classList.add("show");
        idx++;
        setTimeout(function(){
          storyImg.classList.remove("show");
          setTimeout(showNext,800);
        },2500);
      };
    },300);
  }
  showNext();
}

function finish(){
  document.getElementById("congrats").classList.remove("hidden");
  document.getElementById("tag").textContent=
    '妳嘗試逃避了 '+escaped+' 次，但最後還是全部承認了 😏';
  startFireworks();
}

function startFireworks(){
  var canvas=document.getElementById("fireworks");
  var ctx=canvas.getContext("2d");
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize(); window.addEventListener("resize",resize);
  var particles=[];
  function rnd(a,b){return a+Math.random()*(b-a);}
  function launch(x,y){
    var hue=Math.floor(rnd(0,360));
    for(var i=0;i<120;i++){
      var spd=rnd(1,6),ang=rnd(0,Math.PI*2);
      particles.push({x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
        life:rnd(60,120),hue:hue,alpha:1});
    }
  }
  var frames=0;
  (function loop(){
    ctx.fillStyle="rgba(0,0,0,0.18)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;
      p.life--;p.alpha*=0.997;
      if(p.life<=0||p.alpha<0.02){particles.splice(i,1);continue;}
      ctx.beginPath();
      ctx.fillStyle='hsla('+p.hue+',90%,60%,'+p.alpha+')';
      ctx.arc(p.x,p.y,2.2,0,Math.PI*2);
      ctx.fill();
    }
    if(++frames%30===0)
      launch(rnd(100,canvas.width-100),rnd(100,canvas.height/2));
    if(frames<600||particles.length>0)requestAnimationFrame(loop);
  })();
}

function startApp(){
  document.getElementById("startScreen").classList.add("hidden");
  modalEl.classList.remove("hidden");
  var bgm=document.getElementById("bgm");
  bgm.volume=0.5;
  bgm.play().catch(function(){});
  render();
}
</script>
</body>
</html>
