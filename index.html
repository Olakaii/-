<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>💕</title>
<style>
  :root { --bg: #111; --modal: #fff; --accent: #f06292; }
  * { box-sizing: border-box; }
  html, body {
    height: 100%; margin: 0;
    font-family: 'Arial', 'Noto Sans TC', sans-serif;
    background: linear-gradient(180deg, #222, #111);
    color: #111;
  }

  /* modal */
  .modal {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .dialog {
    background: var(--modal);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
    text-align: center;
    max-width: 90%;
    transition: opacity .3s;
  }
  .dialog.fade { opacity: 0; }
  .dialog h2 { margin: 0 0 6px; font-size: 22px; }
  .dialog .hint { font-size: 13px; color: #bbb; margin-bottom: 18px; }
  .dialog .reply { font-size: 20px; font-weight: 700; color: var(--accent); padding: 18px 0; }

  /* dots */
  .dots { display: flex; gap: 5px; justify-content: center; margin-bottom: 14px; }
  .dots span { width: 7px; height: 7px; border-radius: 50%; background: #e0e0e0; display: inline-block; }
  .dots span.on { background: var(--accent); }

  /* buttons */
  .buttons {
    position: relative; height: 56px;
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
  }
  .btn {
    padding: 10px 20px; border-radius: 8px; border: 0;
    cursor: pointer; font-size: 16px; font-weight: 700;
  }
  .agree { background: var(--accent); color: #fff; }
  .disagree {
    background: #ddd; color: #333;
    position: fixed; margin: 0; z-index: 9999;
  }
  .disagree:disabled { pointer-events: none; opacity: .98; }

  .hidden { display: none; }

  /* congrats */
  .congrats {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(0,0,0,.6), rgba(0,0,0,.8));
    color: #fff;
  }
  .congrats.hidden { display: none !important; }
  .congrats h1 {
    font-size: 72px; margin: 0 0 10px;
    text-shadow: 0 4px 16px rgba(0,0,0,.6);
    z-index: 1;
  }
  .congrats p {
    font-size: 16px; opacity: .8; z-index: 1;
  }
  .congrats .tag {
    margin-top: 12px; padding: 8px 16px;
    background: rgba(255,255,255,.15);
    border-radius: 8px; font-weight: 700;
    font-size: 14px; z-index: 1;
  }
  #fireworks {
    position: absolute; inset: 0;
    display: block; width: 100%; height: 100%;
  }

  @media (max-width: 420px) {
    .dialog { padding: 20px; }
    .dialog h2 { font-size: 19px; }
    .congrats h1 { font-size: 48px; }
  }
</style>
</head>
<body>

<div class="modal" id="modal">
  <div class="dialog" id="dialog"></div>
</div>

<div class="congrats hidden" id="congrats">
  <h1>💕Hehehe💕</h1>
  <p>就知道妳想kaikai～每一題都逃不掉呢 😏</p>
  <div class="tag" id="tag"></div>
  <canvas id="fireworks"></canvas>
</div>

<script>
const QS = [
  { q:"Baby 妳今天想kaikai了嗎？", h:"老實回答喔 🤨", y:"想了啦", n:"才沒有", r:"這才乖嘛 💗" },
  { q:"那妳有多想kaikai？", h:"選一個最真實的", y:"超級想!", n:"一點點而已", r:"kaikai也超級想妳 🥺" },
  { q:"妳現在在笑對不對？", h:"不要裝了啦", y:"被你發現了", n:"才沒有笑", r:"笑起來最好看了 😊" },
  { q:"妳覺得kaikai可愛嗎？", h:"認真想一下再回答", y:"超可愛的好嗎", n:"還好吧", r:"Baby比較可愛啦 ☺️" },
  { q:"妳愛kaikai嗎？", h:"這題很重要喔 💓", y:"愛妳愛妳愛妳", n:"讓我想想", r:"kaikai也愛妳 💕" },
  { q:"妳會一直想著kaikai嗎？", h:"答對了就放妳走～", y:"一直都會", n:"不一定欸", r:"那我們說好了喔 💕" }
];

let cur = 0, escaped = 0;
const dialog = document.getElementById("dialog");
const modalEl = document.getElementById("modal");

/* ── smooth dodge state ── */
const CM = 96 / 2.54;
const KEEP_DIST = 5 * CM;
let btnOrigX = null, btnOrigY = null;
let currentTX = 0, currentTY = 0;
let targetTX = 0, targetTY = 0;
let mouseX = -9999, mouseY = -9999;
let noBtn = null;
let yesBtn = null;

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function resetDodge() {
  btnOrigX = null; btnOrigY = null;
  currentTX = 0; currentTY = 0;
  targetTX = 0; targetTY = 0;
}

function computeTarget() {
  if (!noBtn) return;
  const btnRect = noBtn.getBoundingClientRect();

  if (btnOrigX === null) {
    const agreeRect = yesBtn.getBoundingClientRect();
    const gap = 12;
    btnOrigX = Math.round(agreeRect.right + gap);
    btnOrigY = Math.round(agreeRect.top);
    btnOrigX = clamp(btnOrigX, 0, window.innerWidth - btnRect.width);
    btnOrigY = clamp(btnOrigY, 0, window.innerHeight - btnRect.height);
    noBtn.style.left = btnOrigX + 'px';
    noBtn.style.top = btnOrigY + 'px';
    noBtn.style.position = 'fixed';
    noBtn.style.margin = '0';
    currentTX = 0; currentTY = 0; targetTX = 0; targetTY = 0;
  }

  const mx = mouseX, my = mouseY;
  const currCX = btnOrigX + currentTX + btnRect.width / 2;
  const currCY = btnOrigY + currentTY + btnRect.height / 2;
  const vx = currCX - mx, vy = currCY - my;
  const dist = Math.hypot(vx, vy);

  if (dist < KEEP_DIST) {
    escaped++;
    let ux, uy;
    if (dist === 0) {
      const a = Math.random() * Math.PI * 2;
      ux = Math.cos(a); uy = Math.sin(a);
    } else {
      ux = vx / dist; uy = vy / dist;
    }
    const desiredCX = mx + ux * KEEP_DIST;
    const desiredCY = my + uy * KEEP_DIST;
    let dL = desiredCX - btnRect.width / 2;
    let dT = desiredCY - btnRect.height / 2;
    dL = clamp(dL, 0, window.innerWidth - btnRect.width);
    dT = clamp(dT, 0, window.innerHeight - btnRect.height);
    targetTX = dL - btnOrigX;
    targetTY = dT - btnOrigY;
  } else {
    targetTX = 0;
    targetTY = 0;
  }
}

window.addEventListener('mousemove', (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
  computeTarget();
});

/* touch support */
window.addEventListener('touchmove', (e) => {
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
  computeTarget();
}, { passive: true });
window.addEventListener('touchstart', (e) => {
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
  computeTarget();
}, { passive: true });

/* smooth animation loop */
(function animate() {
  const ease = 0.14;
  currentTX += (targetTX - currentTX) * ease;
  currentTY += (targetTY - currentTY) * ease;
  if (Math.abs(targetTX - currentTX) < 0.3) currentTX = targetTX;
  if (Math.abs(targetTY - currentTY) < 0.3) currentTY = targetTY;
  if (noBtn) noBtn.style.transform = `translate(${currentTX}px, ${currentTY}px)`;
  requestAnimationFrame(animate);
})();

/* ── dots html ── */
function dots(filled) {
  return `<div class="dots">${QS.map((_, i) => `<span class="${i < filled ? 'on' : ''}"></span>`).join('')}</div>`;
}

/* ── render question ── */
function render() {
  if (cur >= QS.length) return finish();
  const d = QS[cur];
  resetDodge();

  dialog.classList.add("fade");
  setTimeout(() => {
    dialog.innerHTML = `
      ${dots(cur)}
      <h2>${d.q}</h2>
      <div class="hint">${d.h}</div>
      <div class="buttons">
        <button class="btn agree" id="yesBtn">${d.y}</button>
        <button class="btn disagree" id="noBtn" disabled tabindex="-1">${d.n}</button>
      </div>`;
    dialog.classList.remove("fade");

    yesBtn = document.getElementById("yesBtn");
    noBtn = document.getElementById("noBtn");

    noBtn.addEventListener('click', (e) => e.preventDefault());

    yesBtn.onclick = () => {
      // hide noBtn immediately
      noBtn.style.display = 'none';
      noBtn = null;

      dialog.classList.add("fade");
      setTimeout(() => {
        dialog.innerHTML = `${dots(cur + 1)}<div class="reply">${d.r}</div>`;
        dialog.classList.remove("fade");
        cur++;
        setTimeout(render, 1000);
      }, 300);
    };

    // trigger initial position calc
    setTimeout(() => computeTarget(), 50);
  }, cur === 0 ? 50 : 320);
}

/* ── final ── */
function finish() {
  modalEl.classList.add("hidden");
  const cg = document.getElementById("congrats");
  cg.classList.remove("hidden");
  document.getElementById("tag").textContent =
    `妳嘗試逃避了 ${escaped} 次，但最後還是承認了 😏`;
  startFireworks();
}

/* ── fireworks ── */
function startFireworks() {
  const canvas = document.getElementById("fireworks");
  const ctx = canvas.getContext("2d");
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);

  const particles = [];
  function random(a, b) { return a + Math.random() * (b - a); }

  function launch(x, y) {
    const hue = Math.floor(random(0, 360));
    for (let i = 0; i < 120; i++) {
      const speed = random(1, 6);
      const angle = random(0, Math.PI * 2);
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: random(60, 120),
        hue, alpha: 1
      });
    }
  }

  let frames = 0;
  function loop() {
    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.04;
      p.life--; p.alpha *= 0.997;
      if (p.life <= 0 || p.alpha < 0.02) { particles.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.fillStyle = `hsla(${p.hue},90%,60%,${p.alpha})`;
      ctx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }
    frames++;
    if (frames % 30 === 0) {
      launch(random(100, canvas.width - 100), random(100, canvas.height / 2));
    }
    if (frames < 600 || particles.length > 0) requestAnimationFrame(loop);
  }
  loop();
}

render();
</script>
</body>
</html>
